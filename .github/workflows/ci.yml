name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: fileops.nvim
      # docs/TESTS/run.lua hard-fails without lib.nvim on the runtimepath
      # (a real runtime dependency, not just optional) -- check it out as a
      # sibling so the run.lua's own sibling-checkout lookup (../lib.nvim)
      # finds it.
      - uses: actions/checkout@v4
        with:
          repository: StefanBartl/lib.nvim
          path: lib.nvim
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - name: Run docs/TESTS suite
        working-directory: fileops.nvim
        run: nvim --headless -i NONE -u NONE -c "set rtp+=." -c "luafile docs/TESTS/run.lua" -c "qa!"

  lint:
    name: lint (stylua + luacheck)
    runs-on: ubuntu-latest
    # stylua is advisory until a one-time `stylua .` formatting pass has landed
    # (existing style predates this config). luacheck already passes clean;
    # the `test` job remains the authoritative gate either way.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: stylua --check
        uses: JohnnyMorganz/stylua-action@v4
        with:
          version: latest
          args: --check .
      - name: luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua-check
          luacheck lua
